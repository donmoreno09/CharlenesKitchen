server {
    listen 80;

    # Root points to Laravel's public/ folder.
    # This is where index.php (the front controller) lives.
    root /var/www/public;

    index index.php index.html;

    # ── Try files ──────────────────────────────────────────────────────────────
    # For every incoming request, Nginx tries in this order:
    # 1. Match the URI as a real file on disk (e.g. /images/logo.png)
    # 2. Match the URI as a real directory (e.g. /storage/)
    # 3. Fall back to index.php — handing control to Laravel's router
    #
    # This is what makes Laravel routing work. Without this, any URL
    # other than "/" would return a 404 from Nginx directly.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM passthrough ────────────────────────────────────────────────────
    # Any .php file request is forwarded to the PHP-FPM container.
    # "app:9000" works because Docker's internal DNS resolves the
    # service name "app" to the app container's IP automatically.
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # ── Deny hidden files ──────────────────────────────────────────────────────
    # Prevents direct browser access to .env, .git, and other hidden files.
    location ~ /\.(?!well-known).* {
        deny all;
    }
}