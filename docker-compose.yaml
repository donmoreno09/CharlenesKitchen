# docker-compose.yml
#
# This file defines all services (containers), how they connect,
# and what resources they share.

services:

  # ── App (PHP-FPM + Laravel) ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile   # Use our custom Dockerfile
    container_name: charlenes_app
    restart: unless-stopped
    working_dir: /var/www

    volumes:
      # Mount local ./src into /var/www inside the container.
      # Any file you change locally is instantly reflected in the container.
      - ./src:/var/www
      # Mount our custom PHP settings file
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini

    networks:
      - charlenes_network

    # Ensure MySQL starts before the app container
    depends_on:
      - mysql

  # ── Nginx (Web Server) ───────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine           # Use official lightweight Nginx image
    container_name: charlenes_nginx
    restart: unless-stopped
    ports:
      - "8080:80"                 # Map host port 8080 → container port 80
                                  # Visit: http://localhost:8080

    volumes:
      - ./src:/var/www            # Same Laravel code mounted here too
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

    networks:
      - charlenes_network

  # ── MySQL ────────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: charlenes_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: charlenes_kitchen
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: charlenes
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"               # 3307 on host avoids conflict with any
                                  # local MySQL installation you may have

    volumes:
      # Named volume: database data persists even if container is removed
      - mysql_data:/var/lib/mysql

    networks:
      - charlenes_network

  # ── phpMyAdmin ───────────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: charlenes_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql             # Connect to our mysql service by name
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "8081:80"                 # Visit: http://localhost:8081

    depends_on:
      - mysql

    networks:
      - charlenes_network

# ── Named Volumes ─────────────────────────────────────────────────────────────
# Declaring mysql_data here makes it a "named volume" managed by Docker.
# Unlike bind mounts, named volumes persist beyond container lifecycle —
# your data survives docker-compose down and back up.
volumes:
  mysql_data:

# ── Network ───────────────────────────────────────────────────────────────────
# A dedicated bridge network allows containers to reach each other
# using their service names as hostnames (e.g. "mysql", "app").
# Without this, containers would be isolated from one another.
networks:
  charlenes_network:
    driver: bridge